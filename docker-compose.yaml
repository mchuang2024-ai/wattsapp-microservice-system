networks:
  esd-network:
    driver: bridge
    name: esd-network

volumes:
  wattsapp_rabbitmq_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wattsapp-rabbit
    ports:
      - "5672:5672"
      - "15673:15672"       # Management UI → http://<vm-ip>:15673
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - wattsapp_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - esd-network
    command: python3 amqp_setup.py
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - kong
    restart: unless-stopped
    networks:
      - esd-network

  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      # FIX 5: changed from localhost → VM IP so browser can reach Kong Manager
      KONG_ADMIN_GUI_URL: "http://213.35.115.213:8002"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
    ports:
      - "8000:8000"     # Kong proxy — all client traffic goes here
      - "8001:8001"     # Kong admin API
      - "8002:8002"     # Kong Manager UI
    volumes:
      - ./kong/kong.yml:/kong/kong.yml
    depends_on:
      - driver
      - booking
      - payment
      - notification
      - maintenance
      - view-slots
      - make-booking
      - handle-No-Show   # FIX 1: was "handle-noshow" → must match service name exactly
      - report-fault
    restart: unless-stopped
    networks:
      - esd-network

  # ── Atomic Services ─────────────────────────────────────────────────

  driver:
    build:
      context: .
      dockerfile: driver/Dockerfile
    image: wattsapp/driver
    container_name: driver
    ports:
      - "5001:5001"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/driver
    networks:
      - esd-network

  booking:
    build:
      context: .
      dockerfile: booking/Dockerfile
    image: wattsapp/booking
    container_name: booking
    ports:
      - "5002:5002"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/booking
    networks:
      - esd-network

  payment:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: wattsapp/payment
    container_name: payment
    ports:
      - "5003:5003"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/payment
    networks:
      - esd-network

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    image: wattsapp/notification
    container_name: notification
    ports:
      - "5004:5004"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/notification
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password123
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - esd-network

  maintenance:
    build:
      context: .
      dockerfile: maintenance/Dockerfile
    image: wattsapp/maintenance
    container_name: maintenance
    ports:
      - "5005:5005"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/maintenance
    networks:
      - esd-network

  # ── Composite Services ───────────────────────────────────────────────

  view-slots:
    build:
      context: .
      dockerfile: view_slots/Dockerfile
    image: wattsapp/view-slots
    container_name: view-slots
    ports:
      - "5006:5006"
    environment:
      - DRIVER_URL=http://driver:5001
      - BOOKING_URL=http://booking:5002
      - OUTSYSTEMS_BASE_URL=https://personal-dftp1xlj.outsystemscloud.com/Status/rest/Status
    depends_on:
      - driver
      - booking
    networks:
      - esd-network

  report-fault:
    build:
      context: .
      dockerfile: report_fault/Dockerfile
    image: wattsapp/report-fault
    container_name: report-fault
    ports:
      - "5010:5010"
    environment:
      - MAINTENANCE_URL=http://maintenance:5005
      - BOOKING_URL=http://booking:5002
      - PAYMENT_URL=http://payment:5003
      - NOTIFICATION_URL=http://notification:5004
      - STATUS_URL=https://personal-dftp1xlj.outsystemscloud.com/Status/rest/Status
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password123
    depends_on:
      maintenance:
        condition: service_started
      booking:
        condition: service_started
      payment:
        condition: service_started
      notification:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - esd-network

  handle-No-Show:
    build:
      context: .
      dockerfile: handleNoShow/dockerfile
    image: wattsapp/handlenoshow
    container_name: handle-No-Show
    ports:
      - "5100:5100"
    environment:
      - DRIVER_URL=http://driver:5001
      - BOOKING_URL=http://booking:5002
      - PAYMENT_URL=http://payment:5003
      - RABBIT_HOST=rabbitmq
      - RABBIT_PORT=5672
      - EXCHANGE_NAME=wattsapp_topic
      - EXCHANGE_TYPE=topic
      - RABBIT_USERNAME=admin
      - RABBIT_PASSWORD=password123
    depends_on:
      driver:
        condition: service_started
      booking:
        condition: service_started
      payment:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - esd-network

  make-booking:
    build:
      context: .
      dockerfile: Make_Booking/Dockerfile
    image: wattsapp/make-booking
    container_name: make-booking
    ports:
      - "5011:5011"
    environment:
      # FIX 4: URLs were swapped — payment is 5003, booking is 5002
      - PAYMENT_URL=http://payment:5003/payment/hold
      - BOOKING_URL=http://booking:5002/booking
      - RABBITMQ_URL=amqp://admin:password123@rabbitmq:5672/%2F
    depends_on:
      payment:
        condition: service_started
      booking:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - esd-network