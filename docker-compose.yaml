networks:
  esd-network:                # key must be esd-network
    driver: bridge
    name: esd-network
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wattsapp-rabbit
    ports:
      - "5672:5672"
      - "15673:15672"         # Management UI on http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - wattsapp_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - esd-network

  driver:
    build:
      context: .
      dockerfile: driver/Dockerfile
    image: wattsapp/driver
    container_name: driver
    ports:
      - "5001:5001"            # changed from 5011 → 5001
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/driver
    dns:
      - 8.8.8.8
    networks:
      - esd-network

  booking:
    build:
      context: .
      dockerfile: booking/Dockerfile
    image: wattsapp/booking
    container_name: booking
    ports:
      - "5002:5002"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/booking
    dns:
      - 8.8.8.8
    networks:
      - esd-network

  payment:
    build:
      context: .
      dockerfile: payment/Dockerfile
    image: wattsapp/payment
    container_name: payment
    ports:
      - "5003:5003"
    # depends_on:
    #   - rabbitmq
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/payment
      # - RABBITMQ_HOST=rabbitmq
      # - RABBITMQ_USER=admin
      # - RABBITMQ_PASS=password123
    dns:
      - 8.8.8.8
    networks:
      - esd-network

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    image: wattsapp/notification
    container_name: notification
    ports:
      - "5004:5004"
    depends_on:
      - rabbitmq
      - driver
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/notification
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password123
      - TELEGRAM_BOT_TOKEN=8766528831:AAFmXWP5UhrEXaOkvB9VP1ILtnN_oYeUUZc
      - DRIVER_URL=http://driver:5001
    dns:
      - 8.8.8.8
    networks:
      - esd-network

  maintenance:
    build:
      context: .
      dockerfile: maintenance/Dockerfile
    image: wattsapp/maintenance
    container_name: maintenance
    ports:
      - "5005:5005"
    environment:
      - dbURL=mysql+mysqlconnector://root:jpPOaVCbCXnTWjDOBzPtDoRKYwqqiClR@caboose.proxy.rlwy.net:45033/maintenance
    dns:
      - 8.8.8.8
    networks:
      - esd-network

  view-slots:
    build:
      context: .
      dockerfile: view_slots/Dockerfile
    image: wattsapp/view-slots
    container_name: view-slots
    ports:
      - "5006:5006"
    environment:
      - DRIVER_URL=http://driver:5001
      - BOOKING_URL=http://booking:5002
      - OUTSYSTEMS_BASE_URL=https://personal-dftp1xlj.outsystemscloud.com/Status/rest/Status
    networks:
      - esd-network
    depends_on:
      - driver
      - booking
      
  report-fault:
    build:
      context: .
      dockerfile: report_fault/Dockerfile
    image: wattsapp/report-fault
    container_name: report-fault
    ports:
      - "5010:5010"
    environment:
      - MAINTENANCE_URL=http://maintenance:5005
      - BOOKING_URL=http://booking:5002
      - PAYMENT_URL=http://payment:5003
      - NOTIFICATION_URL=http://notification:5004
      - DRIVER_URL=http://driver:5001
      - STATUS_URL=https://personal-dftp1xlj.outsystemscloud.com/Status/rest/Status
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password123
    networks:
      - esd-network
    depends_on:
      - maintenance
      - booking
      - payment
      - notification
      - rabbitmq

  handle-No-Show:
    build:
      context: .
      dockerfile: handleNoShow/dockerfile
    image: wattsapp/handlenoshow
    container_name: handle-No-Show
    ports:
      - "5100:5100"
    environment:
      - DRIVER_URL=http://driver:5001
      - BOOKING_URL=http://booking:5002
      - PAYMENT_URL=http://payment:5003
      - RABBIT_HOST=rabbitmq
      - RABBIT_PORT=5672
      - EXCHANGE_NAME=wattsapp_topic
      - EXCHANGE_TYPE=topic
      - RABBIT_USERNAME=admin
      - RABBIT_PASSWORD=password123
    networks:
      - esd-network
    depends_on:
      - driver
      - booking
      - payment
      - rabbitmq
      
  make-booking:
    build:
      context: .
      dockerfile: Make_Booking/Dockerfile
    image: wattsapp/make-booking
    container_name: make-booking
    environment:
      - PAYMENT_URL=http://payment:5003/payment/hold
      - BOOKING_URL=http://booking:5002/booking
      - DRIVER_URL=http://driver:5001
      - RABBITMQ_URL=amqp://admin:password123@rabbitmq:5672/%2F
    ports:
      - "5011:5011"
    depends_on:
      - payment
      - booking
      - driver
      - rabbitmq
    networks:
      - esd-network

  kong:
    image: kong:3.6
    container_name: kong
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - esd-network
    depends_on:
      - driver
      - booking
      - payment
      - notification
      - maintenance
      - view-slots
      - report-fault
      - make-booking
      - handle-No-Show
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: wattsapp/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://make-booking:5011
      - NEXT_PUBLIC_BOOKING_URL=http://booking:5002
      - NEXT_PUBLIC_DRIVER_URL=http://driver:5001
      - NEXT_PUBLIC_VIEW_SLOTS_URL=http://view-slots:5006
      - NEXT_PUBLIC_HANDLE_NOSHOW_URL=http://handle-No-Show:5100
      - NEXT_PUBLIC_REPORT_FAULT_URL=http://report-fault:5010
    depends_on:
      - kong
    networks:
      - esd-network
volumes:
  wattsapp_rabbitmq_data:

  