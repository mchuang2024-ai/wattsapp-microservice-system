services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wattsapp-rabbit
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - wattsapp_rabbitmq_data:/var/lib/rabbitmq

