global:
  scrape_interval: 15s
  evaluation_interval: 15s

# remote_write to Grafana Cloud — set credentials via environment variables or
# replace the placeholder values below with your actual Grafana Cloud credentials.
# remote_write:
#   - url: https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/prom/push
#     basic_auth:
#       username: '<YOUR_GRAFANA_USERNAME>'
#       password: '<YOUR_GRAFANA_API_KEY>'

scrape_configs:
  - job_name: kong
    static_configs:
      - targets:
          - kong:8001
  - job_name: 'esd-microservices'
    static_configs:
      - targets: ['172.18.0.1:9100']
        labels:
          app: 'node-exporter'
