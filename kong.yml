_format_version: "3.0"
_transform: true

services:
  - name: driver-service
    url: http://driver:5001
    routes:
      - name: driver-route
        paths:
          - /drivers
          - /driver
        strip_path: false

  - name: booking-service
    url: http://booking:5002
    routes:
      - name: booking-route
        paths:
          - /booking
        strip_path: false

  - name: payment-service
    url: http://payment:5003
    routes:
      - name: payment-route
        paths:
          - /payment
        strip_path: false

  - name: notification-service
    url: http://notification:5004
    routes:
      - name: notification-route
        paths:
          - /notification
        strip_path: false

  - name: maintenance-service
    url: http://maintenance:5005
    routes:
      - name: maintenance-route
        paths:
          - /maintenance
        strip_path: false

  - name: view-slots-service
    url: http://view-slots:5006
    routes:
      - name: view-slots-route
        paths:
          - /view-slots
        strip_path: false

  - name: report-fault-service
    url: http://report-fault:5010
    routes:
      - name: report-fault-route
        paths:
          - /reportfault
          - /health
        strip_path: false

  - name: make-booking-service
    url: http://make-booking:5011
    routes:
      - name: make-booking-route
        paths:
          - /make-booking
        strip_path: true

  - name: handle-noshow-service
    url: http://handle-No-Show:5100
    routes:
      - name: handle-noshow-route
        paths:
          - /handle-noshow
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Content-Type
        - Authorization
        - Accept
      credentials: true
      max_age: 3600

  - name: prometheus
